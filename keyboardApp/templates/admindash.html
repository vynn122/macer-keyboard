<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{ csrf_token }}" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        --warning-gradient: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        --danger-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        --dark-gradient: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
        --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        --hover-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      }

      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
      }

      .main-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      .header-section {
        background: var(--primary-gradient);
        border-radius: 20px;
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: var(--card-shadow);
        color: white;
        position: relative;
        overflow: hidden;
      }

      .header-section::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -50%;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 0%,
          transparent 70%
        );
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(180deg);
        }
      }

      .logout-btn {
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 0.75rem 2rem;
        border-radius: 50px;
        font-weight: 600;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
      }

      .logout-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        border-color: rgba(255, 255, 255, 0.5);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        color: white;
      }

      .dashboard-title {
        font-size: 2.5rem;
        font-weight: 700;
        margin: 0;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      }

      .dashboard-subtitle {
        font-size: 1.1rem;
        opacity: 0.9;
        margin-top: 0.5rem;
      }

      .form-card {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        margin-bottom: 2rem;
        box-shadow: var(--card-shadow);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .form-card:hover {
        box-shadow: var(--hover-shadow);
        transform: translateY(-5px);
      }

      .form-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .form-control {
        border: 2px solid #f1f3f4;
        border-radius: 15px;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: #fafbfc;
      }

      .form-control:focus {
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        background: white;
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--primary-gradient);
        border: none;
        border-radius: 50px;
        padding: 0.75rem 2rem;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        background: var(--primary-gradient);
        border: none;
      }

      .table-card {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: var(--card-shadow);
        transition: all 0.3s ease;
      }

      .table-card:hover {
        box-shadow: var(--hover-shadow);
      }

      .table-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .table {
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      }

      .table thead th {
        background: var(--primary-gradient);
        color: white;
        border: none;
        padding: 1rem;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
      }

      .table tbody td {
        padding: 1rem;
        vertical-align: middle;
        border-bottom: 1px solid #f8f9fa;
      }

      .table tbody tr {
        transition: all 0.3s ease;
      }

      .table tbody tr:hover {
        background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
        transform: scale(1.01);
      }

      .btn-sm {
        border-radius: 20px;
        padding: 0.4rem 1rem;
        font-weight: 500;
        font-size: 0.875rem;
        margin: 0 0.2rem;
        transition: all 0.3s ease;
      }

      .btn-warning {
        background: var(--warning-gradient);
        border: none;
        color: #8b4513;
        box-shadow: 0 2px 10px rgba(255, 193, 7, 0.3);
      }

      .btn-warning:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        color: #8b4513;
      }

      .btn-danger {
        background: var(--danger-gradient);
        border: none;
        color: #dc3545;
        box-shadow: 0 2px 10px rgba(220, 53, 69, 0.3);
      }

      .btn-danger:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(220, 53, 69, 0.4);
        color: #dc3545;
      }

      .item-image {
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
        object-fit: cover;
      }

      .item-image:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      }

      .current-image-preview {
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border: 3px solid #e9ecef;
        transition: all 0.3s ease;
      }

      .current-image-preview:hover {
        transform: scale(1.05);
        border-color: #667eea;
      }

      .price-tag {
        font-weight: 700;
        color: #28a745;
        font-size: 1.1rem;
      }

      .brand-badge {
        background: var(--success-gradient);
        color: white;
        padding: 0.3rem 0.8rem;
        border-radius: 20px;
        font-weight: 500;
        font-size: 0.875rem;
      }

      .input-group {
        position: relative;
        margin-bottom: 1rem;
      }

      .input-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: #6c757d;
        z-index: 10;
      }

      .form-control.with-icon {
        padding-left: 3rem;
      }

      .floating-elements {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        overflow: hidden;
      }

      .floating-elements::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(102, 126, 234, 0.1) 0%,
          transparent 70%
        );
        border-radius: 50%;
        top: 10%;
        left: 80%;
        animation: float 8s ease-in-out infinite;
      }

      .floating-elements::after {
        content: "";
        position: absolute;
        width: 200px;
        height: 200px;
        background: radial-gradient(
          circle,
          rgba(245, 87, 108, 0.1) 0%,
          transparent 70%
        );
        border-radius: 50%;
        bottom: 20%;
        left: 10%;
        animation: float 6s ease-in-out infinite reverse;
      }

      @media (max-width: 768px) {
        .main-container {
          padding: 1rem;
        }

        .dashboard-title {
          font-size: 2rem;
        }

        .form-card,
        .table-card {
          padding: 1.5rem;
        }

        .table {
          font-size: 0.875rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="floating-elements"></div>

    <div class="main-container">
      <div class="header-section">
        <div class="d-flex justify-content-between align-items-start flex-wrap">
          <div>
            <h1 class="dashboard-title">
              <i class="fas fa-tachometer-alt me-3"></i>Admin Dashboard
            </h1>
            <p class="dashboard-subtitle">
              Manage your keyboard inventory with style
            </p>
          </div>
          <button type="button" id="logoutButton" class="logout-btn">
            <i class="fas fa-sign-out-alt me-2"></i>Logout
          </button>
        </div>
      </div>

      <div class="form-card">
        <h3 class="form-title">
          <i class="fas fa-plus-circle text-primary"></i>
          Add New Item
        </h3>

        <form id="itemForm" enctype="multipart/form-data">
          <input type="hidden" id="itemId" />

          <div class="row">
            <div class="col-md-6">
              <div class="input-group">
                <i class="fas fa-keyboard input-icon"></i>
                <input
                  type="text"
                  id="itemName"
                  placeholder="Item Name"
                  class="form-control with-icon"
                  required
                />
              </div>
            </div>
            <div class="col-md-6">
              <div class="input-group">
                <i class="fas fa-palette input-icon"></i>
                <input
                  type="text"
                  id="itemColor"
                  placeholder="Key Color"
                  class="form-control with-icon"
                />
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="input-group">
                <i class="fas fa-tag input-icon"></i>
                <input
                  type="text"
                  id="itemBrand"
                  placeholder="Brand"
                  class="form-control with-icon"
                />
              </div>
            </div>
            <div class="col-md-6">
              <div class="input-group">
                <i class="fas fa-dollar-sign input-icon"></i>
                <input
                  type="number"
                  id="itemPrice"
                  placeholder="Price"
                  class="form-control with-icon"
                  step="0.01"
                />
              </div>
            </div>
          </div>

          <div class="mb-3">
            <div class="input-group">
              <i class="fas fa-align-left input-icon"></i>
              <input
                type="text"
                id="itemDescription"
                placeholder="Description"
                class="form-control with-icon"
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">
              <i class="fas fa-image me-2"></i>Product Image
            </label>
            <input type="file" id="itemImage" class="form-control" />
            <img
              id="currentImagePreview"
              src=""
              width="120"
              class="mt-3 current-image-preview"
              style="display: none"
            />
          </div>

          <button
            type="submit"
            class="btn btn-primary"
            onclick="
              document.getElementById('currentImagePreview').style.display =
                'none'
            "
          >
            <i class="fas fa-save me-2"></i>Save Item
          </button>
          <button
            type="reset"
            class="btn btn-secondary ms-2"
            onclick="resetForm()"
            onmouseover="this.style.backgroundColor = '#f093fb'"
            onmouseout="this.style.backgroundColor = ''"
            onfocus="this.style.backgroundColor = '#f093fb'"
            onblur="this.style.backgroundColor = ''"
          >
            <i class="fas fa-undo me-2"></i>Reset Form
          </button>
        </form>
      </div>

      <div class="table-card">
        <h3 class="table-title">
          <i class="fas fa-list text-primary"></i>
          Inventory Management
        </h3>

        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th><i class="fas fa-image me-2"></i>Preview</th>
                <th><i class="fas fa-keyboard me-2"></i>Name</th>
                <th><i class="fas fa-dollar-sign me-2"></i>Price</th>
                <th><i class="fas fa-tag me-2"></i>Brand</th>
                <th><i class="fas fa-cogs me-2"></i>Actions</th>
              </tr>
            </thead>
            <tbody id="itemTable"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      // let baseUrl = "http://localhost:8000";
      let baseUrl = window.location.origin;
      const API_URL = "/keyboardApp/api/admin/items/";
      let originalItemData = null;
      const logoutButton = document.getElementById("logoutButton");
      logoutButton.addEventListener("click", async function () {
        Swal.fire({
          title: "Are you sure?",
          text: "You will be logged out.",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#667eea",
          cancelButtonColor: "#6c757d",
          confirmButtonText: "Yes, log out!",
        }).then(async (result) => {
          if (result.isConfirmed) {
            try {
              const logoutResp = await fetch(
                `${baseUrl}/api/keyboardApp/auth/logout`,
                { credentials: "include" },
              );

              if (!logoutResp.ok) throw new Error("Failed to log out");

              Swal.fire({
                icon: "success",
                title: "Logged Out",
                text: "You have been successfully logged out.",
                confirmButtonColor: "#28a745",
                timer: 2000,
                showConfirmButton: false,
              }).then(() => {
                window.location.href = "/keyboardApp/home";
              });
            } catch (err) {
              console.log(err);
              Swal.fire({
                icon: "error",
                title: "Logout Failed",
                text: "Something went wrong. Please try again.",
                confirmButtonColor: "#dc3545",
              });
            }
          }
        });

        // try {
        //   let logoutResp = await fetch(
        //     "http://127.0.0.1:8000/api/keyboardApp/auth/logout",
        //     { credentials: "same-origin" }
        //   );
        //   alert("log out successfully");
        //   window.location.href = "/keyboardApp/home";
        // } catch (err) {
        //   console.log(err);
        //   alert("Failed to log out, Please try again");
        // }
      });
      function getCSRFToken() {
        return document
          .querySelector('meta[name="csrf-token"]')
          .getAttribute("content");
      }

      function fetchItems() {
        fetch(API_URL)
          .then((res) => res.json())
          .then((items) => {
            const table = document.getElementById("itemTable");
            table.innerHTML = "";
            items.forEach((item) => {
              const row = `
          <tr>
            <td><img src="${item.item_image}" width="80" class="item-image" /></td>
            <td><strong>${item.item_name}</strong></td>
            <td><span class="price-tag">$${item.item_price}</span></td>
            <td><span class="brand-badge">${item.item_brand}</span></td>
            <td>
              <button onclick="editItem(${item.item_id})" class="btn btn-sm btn-warning">
                <i class="fas fa-edit me-1"></i>Edit
              </button>
              <button onclick="deleteItem(${item.item_id})" class="btn btn-sm btn-danger">
                <i class="fas fa-trash me-1"></i>Delete
              </button>
            </td>
          </tr>`;
              table.innerHTML += row;
            });
          });
      }

      document
        .getElementById("itemForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const id = document.getElementById("itemId").value;
          const name = document.getElementById("itemName").value.trim();
          const description = document
            .getElementById("itemDescription")
            .value.trim();
          const color = document.getElementById("itemColor").value.trim();
          const brand = document.getElementById("itemBrand").value.trim();
          const price = document.getElementById("itemPrice").value.trim();
          const images = document.getElementById("itemImage").files[0];

          if (!name || !description || !color || !brand || !price) {
            Swal.fire({
              icon: "warning",
              title: "Missing Fields",
              text: "Please fill in all required fields.",
              confirmButtonColor: "#f093fb",
            });
            return;
          }

          // validate price
          if (isNaN(price) || parseFloat(price) <= 0) {
            Swal.fire({
              icon: "warning",
              title: "Invalid Price",
              text: "Please enter a valid positive price.",
              confirmButtonColor: "#f093fb",
            });
            return;
          }

          // image require for new item
          if (!id && !images) {
            Swal.fire({
              icon: "warning",
              title: "Image Required",
              text: "Please upload a product image.",
              confirmButtonColor: "#f093fb",
            });
            return;
          }

          const newItemData = {
            item_name: document.getElementById("itemName").value,
            item_description: document.getElementById("itemDescription").value,
            item_key_color: document.getElementById("itemColor").value,
            item_brand: document.getElementById("itemBrand").value,
            item_price: document.getElementById("itemPrice").value,
            item_image: document.getElementById("itemImage").files[0],
          };

          if (id && originalItemData) {
            const isUnchanged =
              newItemData.item_name === originalItemData.item_name &&
              newItemData.item_description ===
                originalItemData.item_description &&
              newItemData.item_key_color === originalItemData.item_key_color &&
              newItemData.item_brand === originalItemData.item_brand &&
              newItemData.item_price === String(originalItemData.item_price) &&
              !newItemData.item_image;

            if (isUnchanged) {
              // alert("No data changed.");
              Swal.fire({
                icon: "info",
                title: "No Changes",
                text: "No data was changed.",
                confirmButtonColor: "#667eea",
              });

              this.reset();
              originalItemData = null;
              document.getElementById("currentImagePreview").style.display =
                "none";
              return;
            }
          }

          const formData = new FormData();
          formData.append(
            "item_name",
            document.getElementById("itemName").value,
          );
          formData.append(
            "item_description",
            document.getElementById("itemDescription").value,
          );
          formData.append(
            "item_key_color",
            document.getElementById("itemColor").value,
          );
          formData.append(
            "item_brand",
            document.getElementById("itemBrand").value,
          );
          formData.append(
            "item_price",
            document.getElementById("itemPrice").value,
          );
          const image = document.getElementById("itemImage").files[0];
          if (image) formData.append("item_image", image);

          const url = id ? `${API_URL}${id}/` : API_URL;
          const method = id ? "PUT" : "POST";

          fetch(url, {
            method: method,
            body: formData,
            headers: {
              "X-CSRFToken": getCSRFToken(),
            },
            credentials: "include",
          })
            .then((res) => {
              if (!res.ok) {
                return res.text().then((text) => {
                  throw new Error(text);
                });
              }
              return res.json();
            })
            .then(() => {
              this.reset();
              fetchItems();
              Swal.fire({
                position: "top-end",
                icon: "success",
                title: "Item has been saved",
                showConfirmButton: false,
                timer: 1500,
              }).then(() => {
                location.reload();
              });
            })
            .catch((err) => {
              console.error("Raw error:", err);
              this.reset();
              // alert("Error saving item: " + err.message);
              Swal.fire({
                icon: "error",
                title: "Save Failed",
                text: `Something went wrong. Please check the data and try again.`,
                confirmButtonColor: "#dc3545",
              });
            });
        });

      function editItem(id) {
        fetch(`${API_URL}${id}/`)
          .then((res) => res.json())
          .then((item) => {
            originalItemData = {
              item_id: item.item_id,
              item_name: item.item_name,
              item_description: item.item_description,
              item_key_color: item.item_key_color,
              item_brand: item.item_brand,
              item_price: item.item_price,
            };
            document.getElementById("itemId").value = item.item_id;
            document.getElementById("itemName").value = item.item_name;
            document.getElementById("itemDescription").value =
              item.item_description;
            document.getElementById("itemColor").value = item.item_key_color;
            document.getElementById("itemBrand").value = item.item_brand;
            document.getElementById("itemPrice").value = item.item_price;
            document.getElementById("currentImagePreview").style.display =
              "block";
            document.getElementById("currentImagePreview").src =
              item.item_image;
          });
      }
      function deleteItem(id) {
        Swal.fire({
          title: "Are you sure?",
          text: "You will not be able to recover this item!",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#dc3545",
          cancelButtonColor: "#6c757d",
          confirmButtonText: "Yes, delete it!",
        }).then((result) => {
          if (result.isConfirmed) {
            fetch(`${API_URL}${id}/`, {
              method: "DELETE",
              headers: {
                "X-CSRFToken": getCSRFToken(),
              },
              credentials: "include",
            }).then(() => {
              fetchItems();
              Swal.fire({
                icon: "success",
                title: "Deleted!",
                text: "Item has been deleted.",
                confirmButtonColor: "#28a745",
              });
            });
          }
        });
      }
      function resetForm() {
        document.getElementById("itemForm").reset();
        document.getElementById("itemId").value = "";
        document.getElementById("currentImagePreview").style.display = "none";
        originalItemData = null;
      }

      // function deleteItem(id) {
      //   if (confirm("Are you sure you want to delete this item?")) {
      //     fetch(`${API_URL}${id}/`, {
      //       method: "DELETE",
      //       headers: {
      //         "X-CSRFToken": getCSRFToken(),
      //       },
      //       credentials: "include",
      //     }).then(fetchItems);
      //   }
      // }

      fetchItems();
    </script>
  </body>
</html>
